<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunicados da Portaria - NEXUS</title>
    <link rel="stylesheet" href="../../public/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body class="admin-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="nexus-brand" aria-label="Portal da portaria">
                <img src="../../public/img/nexus-logo.svg" alt="Logo Nexus" class="nexus-brand-mark">
                <div class="nexus-brand-text">
                    <strong data-condominio-nome>NEXUS</strong>
                    <span>PORTARIA</span>
                </div>
            </div>
        </div>
        <nav>
            <ul>
                <li><a href="painel-colaborador.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="../ocorrencias/ocorrencias-colaborador.html"><i class="fas fa-comment-dots"></i> Ocorrências</a></li>
                <li><a href="plantao.html"><i class="fas fa-clipboard-list"></i> Plantão e Agenda</a></li>
                <li><a href="reservas.html"><i class="fas fa-calendar-alt"></i> Reservas</a></li>
                <li class="active"><a href="avisos.html"><i class="fas fa-bell"></i> Comunicados</a></li>
                <li><a href="/"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <div class="dashboard-header">
            <h1>Comunicados operacionais</h1>
            <p>Informações oficiais da administração e do síndico para consulta da portaria.</p>
        </div>

        <div class="controls-container">
            <div class="search-group">
                <input type="search" placeholder="Buscar por assunto..." class="search-input" data-comunicados-search>
            </div>
        </div>

        <section class="avisos-list" data-comunicados-list></section>

        <template data-comunicados-template>
            <article class="widget aviso-card">
                <header class="aviso-card-header">
                    <h3 class="aviso-card-title"></h3>
                    <span class="aviso-card-date"></span>
                </header>
                <p class="aviso-card-body"></p>
                <footer class="aviso-card-footer">
                    <span class="status-pill aviso-prioridade"></span>
                </footer>
            </article>
        </template>

        <footer class="content-footer">
            <p>&copy; 2025 Projeto Nexus. Todos os direitos reservados.</p>
        </footer>
    </main>

    <script src="../../public/js/script.js"></script>
    <script>
        document.querySelector('a[href="/"]').addEventListener('click', function (event) {
            event.preventDefault();
            localStorage.removeItem('nexus_token');
            localStorage.removeItem('nexus_user');
            window.location.href = '/';
        });
    </script>
</body>

</html>
