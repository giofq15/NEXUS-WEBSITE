<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Acesso ao Sistema - NEXUS</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body.login-body {
            margin: 0;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            background:
                linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
                url('../../public/predios.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .top-logo {
            color: #fff;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
        }

        .login-container {
            width: 350px;
            padding: 40px 50px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.92);
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #1b2c48;
            margin-bottom: 10px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .password-input {
            position: relative;
            width: 100%;
        }

        .password-input input {
            width: 100%;
            padding-right: 40px;
        }

        .password-input .toggle-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            width: 25px;
            color: #666;
            cursor: pointer;
            font-size: 16px;
            text-align: center;
            transform: translateY(-50%);
            user-select: none;
        }

        .password-input .toggle-icon::before {
            content: "\f070";
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
        }

        .password-input .toggle-icon.show::before {
            content: "\f06e";
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 13px;
            color: #ff6600;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #1b2c48;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-button:hover {
            background-color: #223c5c;
            transform: scale(1.03);
        }

        .login-button:disabled {
            cursor: wait;
            opacity: 0.75;
            transform: none;
        }

        @media (max-width: 400px) {
            .login-container {
                width: 90%;
                padding: 30px 25px;
            }

            .top-logo {
                font-size: 34px;
            }
        }
    </style>
</head>

<body class="login-body">
    <div class="top-logo">NEXUS</div>

    <div class="login-container">
        <h2 id="login-heading"></h2>

        <form action="#" method="POST" id="login-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu.email@exemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="password-input">
                    <input type="password" id="password" placeholder="********" required>
                    <span class="toggle-icon" id="togglePassword"></span>
                </div>
            </div>

            <a href="forgot-password.html" class="forgot-password" id="forgot-password-link">Esqueceu a senha?</a>

            <button type="submit" class="login-button">Acessar</button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            const portal = role === 'admin' ? 'admin' : 'colaborador';
            const heading = document.getElementById('login-heading');
            const form = document.getElementById('login-form');
            const password = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const forgotPasswordLink = document.getElementById('forgot-password-link');

            const destino = portal === 'admin'
                ? '../admin/painel-admin.html'
                : '../colaborador/painel-colaborador.html';

            heading.textContent = portal === 'admin'
                ? 'Acesso do Administrador'
                : 'Acesso do Colaborador';

            forgotPasswordLink.href = `forgot-password.html${role ? `?role=${encodeURIComponent(role)}` : ''}`;

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                if (!form.checkValidity()) return;

                const email = document.getElementById('email').value;
                const pwd = password.value;
                const btn = form.querySelector('.login-button');
                btn.disabled = true;
                btn.textContent = 'Entrando...';

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pwd, portal }),
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        alert(data.error || 'Erro ao fazer login');
                        btn.disabled = false;
                        btn.textContent = 'Acessar';
                        return;
                    }

                    localStorage.setItem('nexus_token', data.token);
                    localStorage.setItem('nexus_user', JSON.stringify(data.user));

                    window.location.href = destino;
                } catch (err) {
                    alert('Erro de conexão com o servidor');
                    btn.disabled = false;
                    btn.textContent = 'Acessar';
                }
            });

            togglePassword.addEventListener('click', function () {
                const isPassword = password.getAttribute('type') === 'password';
                password.setAttribute('type', isPassword ? 'text' : 'password');
                this.classList.toggle('show', isPassword);
            });
        });
    </script>
</body>

</html>
