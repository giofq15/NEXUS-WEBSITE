<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Acesso ao Sistema - NEXUS</title>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ====== ESTILO GERAL ====== */
        body.login-body {
            margin: 0;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            background:
                linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
                url('../../public/predios.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* ====== LOGO ====== */
        .top-logo {
            color: #fff;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
        }

        /* ====== CONTAINER DE LOGIN ====== */
        .login-container {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
            width: 350px;
            text-align: center;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #1b2c48;
            margin-bottom: 10px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        /* ====== CAMPO DE SENHA ====== */
        .password-input {
            position: relative;
            width: 100%;
        }

        .password-input input {
            width: 100%;
            padding-right: 40px;
        }

        .password-input .toggle-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 16px;
            width: 25px;
            text-align: center;
            user-select: none;
        }

        /* O ícone muda via CSS, mas mantém o mesmo tamanho */
        .password-input .toggle-icon::before {
            content: "\f070";
            /* fa-eye-slash */
            font-family: "Font Awesome 5 Free";
            font-weight: 900;
        }

        .password-input .toggle-icon.show::before {
            content: "\f06e";
            /* fa-eye */
        }

        .forgot-password {
            display: block;
            text-align: right;
            font-size: 13px;
            color: #ff6600;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #1b2c48;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-button:hover {
            background-color: #223c5c;
            transform: scale(1.03);
        }

        .divider {
            margin: 20px 0;
            color: #aaa;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #ccc;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .social-login button {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
        }

        .google-btn:hover,
        .facebook-btn:hover {
            background: #f5f5f5;
            transform: scale(1.02);
        }

        .facebook-btn {
            color: #3b5998;
        }

        .signup-link {
            font-size: 13px;
            margin-top: 15px;
            color: #333;
        }

        .signup-link a {
            color: #1b2c48;
            font-weight: bold;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 400px) {
            .login-container {
                width: 90%;
                padding: 30px 25px;
            }

            .top-logo {
                font-size: 34px;
            }
        }
    </style>
</head>

<body class="login-body">
    <div class="top-logo">NEXUS</div>

    <div class="login-container">
        <h2 id="login-heading"></h2>

        <form action="#" method="POST" id="login-form">

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu.email@exemplo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <div class="password-input">
                    <input type="password" id="password" placeholder="********" required>
                    <span class="toggle-icon" id="togglePassword"></span>
                </div>
            </div>

            <a href="#" class="forgot-password">Esqueceu a senha?</a>

            <button type="submit" class="login-button">Acessar</button>

            <div class="divider">OU</div>

            <div class="social-login">
                <button type="button" class="google-btn"><i class="fab fa-google"></i> Continuar com Google</button>
                <button type="button" class="facebook-btn"><i class="fab fa-facebook-f"></i> Continuar com
                    Facebook</button>
            </div>

            <p class="signup-link">
                É novo por aqui? <a href="#">Solicite seu Cadastro</a>
            </p>
        </form>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const params = new URLSearchParams(window.location.search);
            const role = params.get('role');
            const heading = document.getElementById('login-heading');
            const form = document.getElementById('login-form');
            const password = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const googleBtn = document.querySelector('.google-btn');
            const facebookBtn = document.querySelector('.facebook-btn');
            let oauthConfig = { googleClientId: null, facebookAppId: null };
            let googleTokenClient = null;

            let destino;

            // Define título e redirecionamento
            if (role === 'admin') {
                heading.textContent = 'Acesso do Administrador';
                destino = '../admin/painel-admin.html';
            } else {
                heading.textContent = 'Acesso do Colaborador';
                destino = '../colaborador/painel-colaborador.html';
            }

            // Login via API
            form.addEventListener('submit', async function (e) {
                e.preventDefault();
                if (!form.checkValidity()) return;

                const email = document.getElementById('email').value;
                const pwd = password.value;
                const btn = form.querySelector('.login-button');
                btn.disabled = true;
                btn.textContent = 'Entrando...';

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password: pwd }),
                    });

                    const data = await res.json();

                    if (!res.ok) {
                        alert(data.error || 'Erro ao fazer login');
                        btn.disabled = false;
                        btn.textContent = 'Acessar';
                        return;
                    }

                    localStorage.setItem('nexus_token', data.token);
                    localStorage.setItem('nexus_user', JSON.stringify(data.user));

                    if (data.user.accessLevel === 'ROOT' || data.user.accessLevel === 'ADMIN' || data.user.role === 'ADMIN') {
                        window.location.href = '../admin/painel-admin.html';
                    } else {
                        window.location.href = '../colaborador/painel-colaborador.html';
                    }
                } catch (err) {
                    alert('Erro de conexão com o servidor');
                    btn.disabled = false;
                    btn.textContent = 'Acessar';
                }
            });

            async function concluirLogin(data) {
                localStorage.setItem('nexus_token', data.token);
                localStorage.setItem('nexus_user', JSON.stringify(data.user));
                localStorage.setItem('nexus_refresh_token', data.refreshToken || '');

                if (data.user.accessLevel === 'ROOT' || data.user.accessLevel === 'ADMIN' || data.user.role === 'ADMIN') {
                    window.location.href = '../admin/painel-admin.html';
                } else {
                    window.location.href = '../colaborador/painel-colaborador.html';
                }
            }

            async function postOAuth(provider, payload) {
                const res = await fetch(`/api/auth/oauth/${provider}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || `Falha no login com ${provider}`);
                }
                await concluirLogin(data);
            }

            try {
                const cfgRes = await fetch('/api/auth/oauth/config');
                if (cfgRes.ok) {
                    oauthConfig = await cfgRes.json();
                }
            } catch {
                // mantém botões, mas login social pode falhar se backend não estiver configurado
            }

            if (googleBtn) {
                googleBtn.addEventListener('click', async function () {
                    if (!oauthConfig.googleClientId) {
                        alert('Login Google não configurado no servidor.');
                        return;
                    }

                    if (!window.google?.accounts?.oauth2) {
                        alert('SDK do Google não carregou. Tente novamente.');
                        return;
                    }

                    if (!googleTokenClient) {
                        googleTokenClient = window.google.accounts.oauth2.initTokenClient({
                            client_id: oauthConfig.googleClientId,
                            scope: 'openid email profile',
                            callback: async (tokenResponse) => {
                                try {
                                    if (!tokenResponse?.access_token) {
                                        alert('Falha ao obter token do Google.');
                                        return;
                                    }
                                    await postOAuth('google', { accessToken: tokenResponse.access_token });
                                } catch (err) {
                                    alert(err.message || 'Erro ao fazer login com Google');
                                }
                            }
                        });
                    }

                    googleTokenClient.requestAccessToken({ prompt: 'select_account' });
                });
            }

            window.fbAsyncInit = function () {
                if (!oauthConfig.facebookAppId) return;
                window.FB.init({
                    appId: oauthConfig.facebookAppId,
                    cookie: false,
                    xfbml: false,
                    version: 'v20.0'
                });
            };

            const fbSdkScript = document.createElement('script');
            fbSdkScript.async = true;
            fbSdkScript.defer = true;
            fbSdkScript.crossOrigin = 'anonymous';
            fbSdkScript.src = 'https://connect.facebook.net/pt_BR/sdk.js';
            document.head.appendChild(fbSdkScript);

            if (facebookBtn) {
                facebookBtn.addEventListener('click', function () {
                    if (!oauthConfig.facebookAppId) {
                        alert('Login Facebook não configurado no servidor.');
                        return;
                    }
                    if (!window.FB) {
                        alert('SDK do Facebook não carregou. Tente novamente.');
                        return;
                    }

                    window.FB.login(async function (response) {
                        try {
                            const accessToken = response?.authResponse?.accessToken;
                            if (!accessToken) {
                                alert('Login Facebook cancelado ou não autorizado.');
                                return;
                            }
                            await postOAuth('facebook', { accessToken });
                        } catch (err) {
                            alert(err.message || 'Erro ao fazer login com Facebook');
                        }
                    }, { scope: 'email,public_profile' });
                });
            }

            // Mostrar/esconder senha sem trocar o ícone (pra não mover)
            togglePassword.addEventListener('click', function () {
                const isPassword = password.getAttribute('type') === 'password';
                password.setAttribute('type', isPassword ? 'text' : 'password');
                this.classList.toggle('show', isPassword);
            });
        });
    </script>
</body>

</html>
