<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Recuperar Senha - NEXUS</title>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ====== ESTILO GERAL ====== */
        body.login-body {
            margin: 0;
            font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
            background:
                linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
                url('../../public/predios.jpg') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* ====== LOGO ====== */
        .top-logo {
            color: #fff;
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.4);
        }

        /* ====== CONTAINER DE RECUPERAÇÃO ====== */
        .login-container {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
            width: 350px;
            text-align: center;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #1b2c48;
            margin-bottom: 10px;
            font-size: 22px;
        }

        .form-description {
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background-color: #1b2c48;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-button:hover {
            background-color: #223c5c;
            transform: scale(1.03);
        }

        .login-button:disabled {
            background-color: #aaa;
            cursor: not-allowed;
            transform: scale(1);
        }

        .back-link {
            display: block;
            text-align: center;
            font-size: 13px;
            color: #ff6600;
            text-decoration: none;
            margin-top: 20px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: left;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @media (max-width: 400px) {
            .login-container {
                width: 90%;
                padding: 30px 25px;
            }

            .top-logo {
                font-size: 34px;
            }
        }
    </style>
</head>

<body class="login-body">
    <div class="top-logo">NEXUS</div>

    <div class="login-container">
        <h2 id="form-heading">Recuperar Senha</h2>
        <p class="form-description">Digite seu e-mail para receber um link de redefinição de senha</p>

        <div id="message-container"></div>

        <!-- Formulário de Solicitação -->
        <form action="#" method="POST" id="forgot-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu.email@exemplo.com" required>
            </div>

            <button type="submit" class="login-button" id="submit-btn">Enviar Link de Redefinição</button>
        </form>

        <!-- Formulário de Redefinição (oculto inicialmente) -->
        <form action="#" method="POST" id="reset-form" style="display: none;">
            <div class="form-group">
                <label for="new-password">Nova Senha</label>
                <input type="password" id="new-password" placeholder="Digite sua nova senha" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar Senha</label>
                <input type="password" id="confirm-password" placeholder="Confirme sua nova senha" required>
            </div>

            <button type="submit" class="login-button" id="reset-submit-btn">Redefinir Senha</button>
        </form>

        <a href="login.html" class="back-link" id="back-login-link">Voltar para Login</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const forgotForm = document.getElementById('forgot-form');
            const resetForm = document.getElementById('reset-form');
            const emailInput = document.getElementById('email');
            const messageContainer = document.getElementById('message-container');
            const backLoginLink = document.getElementById('back-login-link');
            const role = params.get('role');

            backLoginLink.href = `login.html${role ? `?role=${encodeURIComponent(role)}` : ''}`;

            function showMessage(message, type) {
                messageContainer.innerHTML = `<div class="message ${type}">${message}</div>`;
            }

            // Se houver token na URL, mostrar formulário de redefinição
            if (token) {
                forgotForm.style.display = 'none';
                resetForm.style.display = 'block';
                document.getElementById('form-heading').textContent = 'Redefinir Senha';

                resetForm.addEventListener('submit', async function (e) {
                    e.preventDefault();

                    const newPassword = document.getElementById('new-password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;

                    if (newPassword !== confirmPassword) {
                        showMessage('As senhas não correspondem', 'error');
                        return;
                    }

                    if (newPassword.length < 6) {
                        showMessage('A senha deve ter no mínimo 6 caracteres', 'error');
                        return;
                    }

                    const btn = document.getElementById('reset-submit-btn');
                    btn.disabled = true;
                    btn.textContent = 'Redefinindo...';

                    try {
                        const res = await fetch('/api/auth/reset-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                token,
                                newPassword
                            }),
                        });

                        const data = await res.json();

                        if (!res.ok) {
                            showMessage(data.error || 'Erro ao redefinir senha', 'error');
                            btn.disabled = false;
                            btn.textContent = 'Redefinir Senha';
                            return;
                        }

                        showMessage('✓ Senha redefinida com sucesso! Redirecionando...', 'success');
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } catch (err) {
                        console.error('Erro:', err);
                        showMessage('Erro de conexão com o servidor', 'error');
                        btn.disabled = false;
                        btn.textContent = 'Redefinir Senha';
                    }
                });
            } else {
                // Formulário de solicitação de reset
                forgotForm.addEventListener('submit', async function (e) {
                    e.preventDefault();

                    const email = emailInput.value;
                    const btn = document.getElementById('submit-btn');
                    btn.disabled = true;
                    btn.textContent = 'Enviando...';

                    try {
                        const res = await fetch('/api/auth/forgot-password', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email }),
                        });

                        const data = await res.json();

                        if (!res.ok) {
                            showMessage(data.message || data.error || 'Erro ao enviar e-mail', 'error');
                            btn.disabled = false;
                            btn.textContent = 'Enviar Link de Redefinição';
                            return;
                        }

                        showMessage(
                            '✓ E-mail enviado com sucesso! Verifique sua caixa de entrada e spam',
                            'success'
                        );
                        emailInput.value = '';
                        btn.disabled = false;
                        btn.textContent = 'Enviar Link de Redefinição';
                    } catch (err) {
                        console.error('Erro:', err);
                        showMessage('Erro de conexão com o servidor', 'error');
                        btn.disabled = false;
                        btn.textContent = 'Enviar Link de Redefinição';
                    }
                });
            }
        });
    </script>
</body>

</html>
